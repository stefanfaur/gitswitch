name: shellcheck
on:
  pull_request:
    paths: [install.sh]
  push:
    branches: [main]
    paths: [install.sh]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning
